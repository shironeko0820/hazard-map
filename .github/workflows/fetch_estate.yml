name: Fetch Estate Data

on:
  workflow_dispatch:  # 手動実行
  schedule:
    - cron: '0 17 15 3,6,9,12 *'  # 四半期ごと JST 2:00

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 120  # 最大2時間（全国47都道府県）
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r batch/requirements.txt

      - name: Fetch national price data (no geocoding)
        run: python batch/fetch_price_national.py
        env:
          MLIT_API_KEY: ${{ secrets.MLIT_API_KEY }}

      - name: Download Japan municipality boundary GeoJSON (smartnews-smri/japan-topography)
        run: |
          echo "=== 全国市区町村境界GeoJSON取得（N03形式, ~1.6MB）==="
          curl -fsSL \
            "https://raw.githubusercontent.com/smartnews-smri/japan-topography/main/data/municipality/geojson/s0001/N03-21_210101.json" \
            -o /tmp/japan_boundary.geojson
          SIZE=$(wc -c < /tmp/japan_boundary.geojson)
          echo "ファイルサイズ: $SIZE bytes"
          python3 -c "
          import json, sys
          try:
              d = json.load(open('/tmp/japan_boundary.geojson'))
              f = d.get('features', [])
              print(f'OK: {len(f):,} ポリゴン')
              if f:
                  keys = list(f[0]['properties'].keys())[:8]
                  print(f'フィールド: {keys}')
                  print(f'サンプル: {dict(list(f[0][\"properties\"].items())[:5])}')
          except Exception as e:
              print(f'ERROR: {e}'); sys.exit(1)
          "

      - name: Generate national choropleth GeoJSON
        run: python batch/generate_choropleth.py
        env:
          JAPAN_GEOJSON_LOCAL: /tmp/japan_boundary.geojson

      - name: Check output
        run: |
          ls -lh public/price_by_municipality.json public/choropleth.geojson 2>/dev/null || echo "Some files not found"
          python -c "
          import json, os
          if os.path.exists('public/price_by_municipality.json'):
              d = json.load(open('public/price_by_municipality.json'))
              print(f'price_by_municipality: {len(d):,}市区町村')
          c = json.load(open('public/choropleth.geojson'))
          matched = sum(1 for f in c['features'] if f['properties'].get('transaction_count',0) > 0)
          print(f'choropleth 総ポリゴン: {len(c[\"features\"]):,}, 価格マッチ: {matched:,}')
          prices = [f['properties']['avg_price_per_sqm'] for f in c['features'] if f['properties'].get('avg_price_per_sqm',0) > 0]
          if prices: print(f'価格範囲: {min(prices):,} ~ {max(prices):,} 円/㎡')
          " || true

      - name: Fetch Tokyo real crime data (警視庁CSV) + merge with mock
        run: node batch/fetch_tokyo_crime.js

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/price_by_municipality.json public/choropleth.geojson public/crime_japan.geojson
          git diff --staged --quiet || git commit -m "data: update price choropleth + Tokyo crime data $(date +'%Y-%m-%d')"
          git push
