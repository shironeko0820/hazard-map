name: Fetch Estate Data

on:
  workflow_dispatch:  # 手動実行
  schedule:
    - cron: '0 17 15 3,6,9,12 *'  # 四半期ごと JST 2:00

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r batch/requirements.txt

      - name: Fetch estate data
        run: python batch/fetch_estate.py
        env:
          MLIT_API_KEY: ${{ secrets.MLIT_API_KEY }}

      - name: Generate choropleth GeoJSON
        run: python batch/generate_choropleth.py

      - name: Check output
        run: |
          ls -lh public/estate_all.geojson public/choropleth.geojson || echo "File not found"
          python -c "
          import json
          d = json.load(open('public/estate_all.geojson'))
          print(f'estate_all 合計: {len(d[\"features\"]):,}件')
          c = json.load(open('public/choropleth.geojson'))
          matched = sum(1 for f in c['features'] if f['properties'].get('transaction_count',0) > 0)
          print(f'choropleth 合計: {len(c[\"features\"]):,}ポリゴン, 価格マッチ: {matched}件')
          prices = [f['properties']['avg_price_per_sqm'] for f in c['features'] if f['properties'].get('avg_price_per_sqm',0) > 0]
          if prices: print(f'価格範囲: {min(prices):,} ~ {max(prices):,} 円/㎡')
          " || true

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/estate_all.geojson public/choropleth.geojson
          git diff --staged --quiet || git commit -m "data: update estate+choropleth data $(date +'%Y-%m-%d')"
          git push
